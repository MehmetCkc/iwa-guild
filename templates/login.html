{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}
    <div class="login-img w-100 h-100 bg-body-tertiary min-vh-100 d-flex flex-column align-items-center justify-content-center">
      
    <form action="/authenticate" method="post" class="login-form d-flex flex-column align-items-center justify-content-center p-5">
          <h1 class="fs-1 mb-4">Welcome Back</h1>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary bg-dark border-0 p-3">Log In</button>
    </form>    
    </div>

{% endblock %}
